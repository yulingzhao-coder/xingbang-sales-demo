<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星邦智能 - 销售管理综合看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root{--bg:#f0f2f5;--card:#fff;--hdr:#fff;--tev:#fafbfc;--tod:#fff;--thov:#eef4fb;--c1:#1f2937;--c2:#6b7280;--c3:#9ca3af;--acc:#1677ff;--grn:#52c41a;--grnd:#389e0d;--yel:#faad14;--org:#fa8c16;--red:#ff4d4f;--pur:#722ed1;--bdr:#e8ecf0;--bdl:#f0f0f0;--r:10px;--rs:6px;--g:16px;--sh:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);--shm:0 4px 16px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);--tr:all .25s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--c1);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d0d5dd;border-radius:3px}
#hdr{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 28px;background:var(--hdr);border-bottom:1px solid var(--bdr);box-shadow:var(--sh)}
.hl{display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#1677ff,#36cfc9);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700}
.hl h1{font-size:16px;font-weight:700;white-space:nowrap}
.hr{font-size:12px;color:var(--c3);white-space:nowrap}
#bc{display:flex;align-items:center;gap:6px;padding:10px 28px;background:var(--card);border-bottom:1px solid var(--bdl);font-size:13px;min-height:40px}
.bcl{color:var(--c3);font-size:12px;margin-right:8px}.bci{color:var(--c2);cursor:pointer;padding:3px 8px;border-radius:var(--rs);transition:var(--tr)}.bci:hover{color:var(--acc);background:rgba(22,119,255,.06)}.bci.cur{color:var(--acc);cursor:default;font-weight:600}.bcs{color:var(--c3);font-size:10px;margin:0 2px}
#main{padding:24px 28px 40px;max-width:1600px;margin:0 auto;animation:fi .4s ease}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.st{display:flex;align-items:center;gap:10px;margin:28px 0 14px;font-size:16px;font-weight:700}.st::before{content:'';width:4px;height:20px;background:linear-gradient(180deg,var(--acc),#36cfc9);border-radius:2px}.st:first-child{margin-top:0}
.ic{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;font-size:14px;margin-right:4px;flex-shrink:0}
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--g)}.kg.c3{grid-template-columns:repeat(3,1fr)}.kg.c6{grid-template-columns:repeat(6,1fr)}.kg.c5{grid-template-columns:repeat(5,1fr)}
.kc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;transition:var(--tr);position:relative;overflow:hidden;cursor:default}
.kc::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0;background:transparent;transition:var(--tr)}
.kc:hover{transform:translateY(-2px);box-shadow:var(--shm);border-color:transparent}
.kc.w::after{background:linear-gradient(90deg,var(--red),transparent)}.kc.ok::after{background:linear-gradient(90deg,var(--grn),transparent)}.kc.mid::after{background:linear-gradient(90deg,var(--yel),transparent)}
.ki{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;font-size:18px;color:#fff}
.ki.bl{background:linear-gradient(135deg,#1677ff,#4096ff)}.ki.gn{background:linear-gradient(135deg,#52c41a,#73d13d)}.ki.og{background:linear-gradient(135deg,#fa8c16,#faad14)}.ki.rd{background:linear-gradient(135deg,#ff4d4f,#ff7875)}.ki.pu{background:linear-gradient(135deg,#722ed1,#9254de)}.ki.tl{background:linear-gradient(135deg,#13c2c2,#36cfc9)}
.kl{font-size:12px;color:var(--c2);margin-bottom:10px;font-weight:500}.kv{font-size:24px;font-weight:800;color:var(--acc);margin-bottom:3px;font-variant-numeric:tabular-nums}.kv.gn{color:var(--grn)}.kv.ye{color:#d48806}.kv.rd{color:var(--red)}.ks{font-size:11px;color:var(--c3)}
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bdr);background:var(--card);box-shadow:var(--sh);margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#f7f8fa;color:var(--c2);font-weight:600;padding:12px 14px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--bdr);font-size:12px;letter-spacing:.3px}
thead th.r{text-align:right}thead th.ct{text-align:center}
tbody tr{transition:var(--tr)}tbody tr:nth-child(even){background:var(--tev)}tbody tr:nth-child(odd){background:var(--tod)}tbody tr:hover{background:var(--thov)}
tbody tr.ck{cursor:pointer}tbody tr.ck td:first-child{color:var(--acc);font-weight:500}tbody tr.ck:hover{box-shadow:inset 3px 0 0 var(--acc)}
tbody td{padding:11px 14px;border-bottom:1px solid var(--bdl);white-space:nowrap}tbody td.r{text-align:right;font-variant-numeric:tabular-nums}tbody td.ct{text-align:center}
tbody tr.sm{background:rgba(22,119,255,.04)!important;font-weight:600}tbody tr.sm td{border-top:2px solid var(--acc)}
tbody tr.al{background:rgba(255,77,79,.04)!important}tbody tr.al td{color:var(--red)}
.lt{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}.lt.g{background:var(--grn);box-shadow:0 0 0 3px rgba(82,196,26,.15)}.lt.y{background:var(--yel);box-shadow:0 0 0 3px rgba(250,173,20,.15)}.lt.r{background:var(--red);box-shadow:0 0 0 3px rgba(255,77,79,.15)}
.pb{display:inline-block;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:600}.pb.h{background:#f6ffed;color:var(--grnd);border:1px solid #b7eb8f}.pb.m{background:#e6fffb;color:#08979c;border:1px solid #87e8de}.pb.l{background:#fff7e6;color:#d46b08;border:1px solid #ffd591}.pb.n{background:#fff1f0;color:#cf1322;border:1px solid #ffa39e}
.sb{display:inline-block;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:500}.sb.f{background:#e6f4ff;color:#0958d9;border:1px solid #91caff}.sb.q{background:#fff7e6;color:#d46b08;border:1px solid #ffd591}.sb.sg{background:#e6fffb;color:#08979c;border:1px solid #87e8de}.sb.sd{background:#f6ffed;color:var(--grnd);border:1px solid #b7eb8f}
.cr{display:grid;grid-template-columns:1fr 1fr;gap:var(--g)}.cr.c3{grid-template-columns:1fr 1fr 1fr}
.cb{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;min-height:360px;box-shadow:var(--sh)}
.ct2{font-size:14px;font-weight:600;margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid var(--bdl)}
.cc{width:100%;height:310px}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:var(--g)}
.tc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;transition:var(--tr);box-shadow:var(--sh)}
.tc:hover{box-shadow:var(--shm);transform:translateY(-2px);border-color:transparent}
.tn{font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--bdl)}
.trow{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;font-size:13px;color:var(--c2)}
.tv{font-weight:600}
.dp{color:var(--grn);font-weight:600}.dn{color:var(--red);font-weight:600}
.mod-card{background:var(--card);border:1px solid var(--bdr);border-left:4px solid var(--acc);border-radius:var(--r);padding:20px;cursor:pointer;transition:var(--tr);position:relative}
.mod-card:hover{box-shadow:0 6px 24px rgba(22,119,255,.15);border-color:var(--acc);border-left-color:var(--acc);transform:translateY(-3px);background:linear-gradient(135deg,rgba(22,119,255,.02),transparent)}
.mod-card .mod-title{font-size:15px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bdl);display:flex;align-items:center;justify-content:space-between;gap:8px}
.mod-card .mod-drill{font-size:12px;font-weight:500;color:var(--acc);display:flex;align-items:center;gap:4px;opacity:.7;transition:var(--tr);white-space:nowrap}
.mod-card:hover .mod-drill{opacity:1;transform:translateX(3px)}
.mod-card .mod-drill svg{width:14px;height:14px}
.mod-card .mod-kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mk .mkl{font-size:11px;color:var(--c2);margin-bottom:3px}.mk .mkv{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.evtag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}.evtag.good{background:#f6ffed;color:var(--grnd);border:1px solid #b7eb8f}.evtag.ok{background:#e6f4ff;color:#0958d9;border:1px solid #91caff}.evtag.warn{background:#fff7e6;color:#d46b08;border:1px solid #ffd591}.evtag.bad{background:#fff1f0;color:#cf1322;border:1px solid #ffa39e}
@media(max-width:1400px){.kg{grid-template-columns:repeat(3,1fr)}.kg.c6,.kg.c5{grid-template-columns:repeat(3,1fr)}}
@media(max-width:1024px){.kg{grid-template-columns:repeat(2,1fr)}.cr,.cr.c3{grid-template-columns:1fr}}
@media(max-width:768px){.kg{grid-template-columns:repeat(2,1fr)}#hdr{flex-wrap:wrap;height:auto;padding:10px 16px;gap:8px}#main{padding:16px}}
</style>
</head>
<body>
<header id="hdr">
  <div class="hl"><span class="logo">星</span><h1>星邦智能 · 销售管理综合看板</h1></div>
  <div class="hr">实时同步 | 数据截止 2026-03-31</div>
</header>
<div id="bc"></div>
<div id="main"></div>
<script>
(function(){"use strict";

/* ===== 工具函数 ===== */
const U={
  fmt(v){if(v==null)return'-';if(Math.abs(v)>=10000)return(v/10000).toFixed(1)+'亿';return v.toLocaleString('zh-CN')+'万'},
  fN(v){return v==null?'-':v.toLocaleString('zh-CN')},
  fP(v){return v==null?'-':v.toFixed(1)+'%'},
  fD(v){if(v==null)return'-';return v>0?'<span class="dp">+'+v.toFixed(1)+'%</span>':'<span class="dn">'+v.toFixed(1)+'%</span>'},
  fDA(v){if(v==null)return'-';return v>0?'<span class="dp">+'+U.fN(v)+'</span>':'<span class="dn">'+U.fN(v)+'</span>'},
  lt(r){return r>=100?'g':r>=80?'y':'r'},
  ltH(r){return'<span class="lt '+U.lt(r)+'"></span>'+U.fP(r)},
  pB(p){const c=p>=75?'h':p>=50?'m':p>=25?'l':'n',l=p>=75?'≥75%':p>=50?'50-75%':p>=25?'25-50%':'<25%';return'<span class="pb '+c+'">'+l+'</span>'},
  sB(s){const m={'跟进中':'f','报价中':'q','待签约':'sg','已签约':'sd'};return'<span class="sb '+(m[s]||'f')+'">'+s+'</span>'},
  evTag(rate){return rate>=30?'<span class="evtag good">表现优异</span>':rate>=22?'<span class="evtag ok">正常推进</span>':rate>=15?'<span class="evtag warn">需关注</span>':'<span class="evtag bad">重点帮扶</span>'},
  el(id){return document.getElementById(id)},
  h(t,c,html){const e=document.createElement(t);if(c)e.className=c;if(html!==undefined)e.innerHTML=html;return e}
};

/* ===== 模拟数据 ===== */
const MD=(function(){
  const org={
    domestic:{label:'国内营销中心',segs:{
      ka:{label:'大客户事业部',rgs:['dkh1','dkh2']},
      east:{label:'华东大区',rgs:['e1','e2']},
      south:{label:'华南大区',rgs:['s1']},
      north:{label:'华北大区',rgs:['n1']},
      west:{label:'西部大区',rgs:['w1']}}},
    intl:{label:'国际营销管理中心',segs:{
      ibu:{label:'国际直营大区',rgs:['au','sea','hktw','kr','ind','cis','tr','jp']},
      ebu:{label:'欧洲事业部',rgs:['nl','uk','mea']},
      abu:{label:'美洲事业部',rgs:['ca','us','mx','br','latam']}}}
  };
  const RL={dkh1:'大客户一部',dkh2:'大客户二部',e1:'华东一区',e2:'华东二区',s1:'华南区',n1:'华北区',w1:'西部区',
    au:'澳新',sea:'东南亚',hktw:'港澳台',kr:'韩国',ind:'印度',cis:'俄语区',tr:'土耳其',jp:'日本',
    nl:'荷兰',uk:'英国',mea:'中东非',
    ca:'加拿大',us:'美国',mx:'墨西哥',br:'巴西',latam:'南美其他'};

  /* 销售数据生成 */
  function gS(t,rate){
    const a=Math.round(t*rate),sh=Math.round(a*1.05),co=Math.round(a*.88),pa=Math.round(t*.9*rate*.95);
    const mo=[],w=[.07,.08,.09,.085,.09,.095,.09,.10,.095,.085,.08,.06];
    for(let m=1;m<=12;m++){const mt=Math.round(t*w[m-1]),ms=Math.round(sh/a*mt*a/t),mc=Math.round(co/a*mt*a/t);
      m<=3?mo.push({m,rT:mt,rA:Math.round(mt*(.9+Math.random()*.3)),sT:ms,sA:Math.round(ms*(.9+Math.random()*.3)),cT:mc,cA:Math.round(mc*(.85+Math.random()*.3))}):
      mo.push({m,rT:mt,rA:null,rF:Math.round(mt*(.9+Math.random()*.2)),sT:ms,sA:null,sF:Math.round(ms*(.9+Math.random()*.2)),cT:mc,cA:null,cF:Math.round(mc*(.85+Math.random()*.2))});}
    const ar=mo.filter(m=>m.rA!=null).reduce((s,m)=>s+m.rA,0),as=mo.filter(m=>m.sA!=null).reduce((s,m)=>s+m.sA,0),ac=mo.filter(m=>m.cA!=null).reduce((s,m)=>s+m.cA,0);
    return{rev:{ann:t,ytd:ar,bgt:t,prev:pa,acc:Math.round(t*.05),accY:Math.round(ar*.05)},ship:{ann:Math.round(t*1.05),ytd:as,bgt:Math.round(t*1.05),prev:Math.round(pa*1.03)},coll:{ann:Math.round(t*.9),ytd:ac,bgt:Math.round(t*.9),prev:Math.round(pa*.85)},mo};
  }

  /* 人员数据生成(增强) */
  function gM(name,t,rate,yr){
    const s=gS(t,rate);
    /* 4档概率商机 */
    const p25=Math.round(t*.06*(.5+Math.random())),p2550=Math.round(t*.10*(.5+Math.random())),
          p5075=Math.round(t*.12*(.5+Math.random())),p75p=Math.round(t*.09*(.5+Math.random()));
    const to=p25+p2550+p5075+p75p, p50=p5075+p75p, oh=Math.round(t*.15*(.5+Math.random()));
    /* 预测 */
    const mTgt=Math.round(t/12),fcSgn=Math.round(mTgt*(.35+Math.random()*.5)),fcPl=Math.round(mTgt*(.15+Math.random()*.35));
    /* 费用 */
    const seAmt=Math.round(s.rev.ytd*(.02+Math.random()*.03)*10000);
    return{name,s,yr:yr||Math.ceil(Math.random()*8),
      oh,to,hp:p50,pl4:{p25,p2550,p5075,p75:p75p},p50,
      pCnt:Math.round(5+Math.random()*20),
      fc:{signed:fcSgn,pipeline:fcPl,total:fcSgn+fcPl,target:mTgt,
        stretch:Math.round((fcSgn+fcPl)*1.15),commit:Math.round((fcSgn+fcPl)*.85)},
      se:seAmt,seR:s.rev.ytd>0?seAmt/(s.rev.ytd*10000)*100:0,
      pipe:[{cu:'客户A-'+name.slice(0,2),pr:'GTZZ22J',am:Math.round(t*.06),pb:75,mn:5,st:'报价中'},
            {cu:'客户B-'+name.slice(0,2),pr:'GTBZ20S',am:Math.round(t*.05),pb:50,mn:6,st:'跟进中'},
            {cu:'客户C-'+name.slice(0,2),pr:'GTZZ16J',am:Math.round(t*.04),pb:85,mn:4,st:'待签约'},
            {cu:'客户D-'+name.slice(0,2),pr:'GTBZ26S',am:Math.round(t*.035),pb:30,mn:7,st:'跟进中'}]};
  }

  /* 产品类型(含新品/套筒) */
  const MT=['直臂式','曲臂式','剪叉式','套筒式','桅柱式','新品'];
  const PM={'直臂式':['GTZZ22J','GTZZ26J','GTZZ30J','GTZZ38J'],'曲臂式':['GTBZ14S','GTBZ18S','GTBZ22S','GTBZ26S'],'剪叉式':['JCPT0807','JCPT1012','JCPT1412'],'套筒式':['GTTT12','GTTT16'],'桅柱式':['WZPT06','WZPT08'],'新品':['SQZZ20','SQZZ25','SKCZ10','SCCZ08']};
  function gP(sc){const d=[];MT.forEach(mt=>{PM[mt].forEach(pm=>{const q=Math.round(Math.random()*20*sc)+1,up=Math.round(15+Math.random()*60),rv=q*up,cr=.6+Math.random()*.15;d.push({mt,pm,q,rv,sh:Math.round(rv*1.05),mg:Math.round(rv*(1-cr)),mr:(1-cr)*100,pd:Math.round((Math.random()-.4)*up*.1*q)});});});return d;}

  /* 费用 */
  const EI=['销售费用','管理费用','研发费用','财务费用'];
  function gE(rs){
    const rv=Math.round(rs*3),items=[],rates=[.08,.04,.06,.015];
    EI.forEach((nm,i)=>{const b=Math.round(rv*rates[i]*(.9+Math.random()*.2)),a=Math.round(b*(.85+Math.random()*.3)),p=Math.round(b*.9*(.85+Math.random()*.3)),pb=Math.round(b*.25);
      items.push({nm,a,b,pb,p,rate:rv>0?a/rv*100:0,bR:rv>0?b/rv*100:0,vsB:a-b,vsBP:b>0?(a-b)/b*100:0,vsP:a-p,vsPP:p>0?(a-p)/p*100:0});});
    const tA=items.reduce((s,i)=>s+i.a,0),tB=items.reduce((s,i)=>s+i.b,0),tPb=items.reduce((s,i)=>s+i.pb,0),tP=items.reduce((s,i)=>s+i.p,0);
    return{rv,items,tot:{a:tA,b:tB,pb:tPb,p:tP,rate:rv>0?tA/rv*100:0,bR:rv>0?tB/rv*100:0,vsB:tA-tB,vsBP:tB>0?(tA-tB)/tB*100:0,vsP:tA-tP,vsPP:tP>0?(tA-tP)/tP*100:0}};
  }

  /* 人员配置 - 国内保持简单，国际按Excel真实结构 */
  const mgrs={},sR={},pR={},eR={};
  const RC={
    /* 国内 */
    dkh1:[['张建华',5500,.33,6],['李明',4800,.32,4]],dkh2:[['王磊',5000,.33,5],['刘洋',4200,.32,3]],
    e1:[['陈强',4000,.33,4],['赵峰',3500,.31,3]],e2:[['孙涛',3800,.32,5],['周军',3200,.31,2]],
    s1:[['吴鑫',4500,.32,6],['郑浩',3800,.32,3]],n1:[['冯伟',4200,.32,4],['钱坤',3600,.32,3]],w1:[['杨帆',3500,.31,3],['许磊',3000,.31,2]],
    /* IBU-澳新(年度目标38000) */
    au:[['王海明',10000,.28,5],['李建国',9500,.26,4],['张峰',9500,.25,3],['陈杰',9000,.24,2]],
    /* IBU-东南亚(20000) */
    sea:[['周强',6000,.24,4],['吴佳慧',5000,.22,3],['林浩',5000,.21,2],['黄涛',4000,.20,1]],
    /* IBU-港澳台(9500) */
    hktw:[['郑鹏飞',5000,.25,4],['何志明',4500,.23,3]],
    /* IBU-韩国(8500) */
    kr:[['刘正宇',5000,.24,3],['金成勋',3500,.22,2]],
    /* IBU-印度(5000) */
    ind:[['马超',3000,.19,2],['Raj Kumar',2000,.17,1]],
    /* IBU-俄语区/CIS(34000) */
    cis:[['唐磊',12000,.22,5],['陈宇',11000,.21,4],['张伟',11000,.20,3]],
    /* IBU-土耳其(15000) */
    tr:[['孙磊',8000,.23,3],['Ahmet',7000,.21,2]],
    /* IBU-日本(5000) */
    jp:[['黄伟',3000,.23,3],['田中太郎',2000,.21,2]],
    /* EBU-荷兰(57000) */
    nl:[['Bensons Pauls',10000,.30,5],['Bogdan Lucjan',9000,.22,3],['Cerdans Sergio',9500,.29,4],['Ionescu Paula',3500,.28,2],['Lanzini Daniele',8000,.25,4],['Meheust Thomas',9000,.26,5],['Schellen Gregor',8000,.18,3]],

    const ft={_s:true,nm:'期间费用合计',a:t4.a,b:t4.b,pb:t4.pb,rate:t4.rate,bR:t4.bR,vsB:t4.vsB,vsBP:t4.vsBP,vsP:t4.vsP,vsPP:t4.vsPP};
    buildT(el,[{key:'nm',label:'费用项目',w:110},{key:'a',label:'累计实际(万)',w:95,align:'r',render:v=>U.fN(v)},{key:'b',label:'累计预算(万)',w:95,align:'r',render:v=>U.fN(v)},{key:'pb',label:'配比额(万)',w:85,align:'r',render:v=>U.fN(v)},{key:'rate',label:'实际费用率',w:80,align:'ct',render:v=>U.fP(v)},{key:'bR',label:'预算费用率',w:80,align:'ct',render:v=>U.fP(v)},{key:'vsB',label:'较预算(万)',w:85,align:'r',render:v=>U.fDA(v)},{key:'vsBP',label:'较预算%',w:75,align:'ct',render:v=>U.fD(v)},{key:'vsP',label:'较同期(万)',w:85,align:'r',render:v=>U.fDA(v)},{key:'vsPP',label:'较同期%',w:75,align:'ct',render:v=>U.fD(v)}],ir.concat([ft]));

      el.appendChild(U.h('div','','<div style="margin:8px 0 4px;font-size:13px;color:var(--c2);font-weight:500">下级单位费用对比</div>'));
      const ur=ch.map(c=>{const e=MD.aE(c.rks);return{_k:c.k,_l:c.l,_nl:c.nl,_sk:c.sk,label:c.l,rv:e.rv,a:e.tot.a,b:e.tot.b,rate:e.tot.rate,bR:e.tot.bR,vsB:e.tot.vsB,vsBP:e.tot.vsBP,vsPP:e.tot.vsPP};});
      buildT(el,[{key:'label',label:'单位',w:150},{key:'rv',label:'收入(万)',w:90,align:'r',render:v=>U.fN(v)},{key:'a',label:'费用(万)',w:90,align:'r',render:v=>U.fN(v)},{key:'b',label:'预算(万)',w:90,align:'r',render:v=>U.fN(v)},{key:'rate',label:'费用率',w:75,align:'ct',render:v=>U.fP(v)},{key:'bR',label:'预算费用率',w:80,align:'ct',render:v=>U.fP(v)},{key:'vsB',label:'较预算(万)',w:85,align:'r',render:v=>U.fDA(v)},{key:'vsBP',label:'较预算%',w:75,align:'ct',render:v=>U.fD(v)},{key:'vsPP',label:'较同期%',w:75,align:'ct',render:v=>U.fD(v)}],ur,{click:true,onClick(r){const u={};u[r._sk]=r._k;Nav.drill(r._l,r._nl,u);}});
    }

    if(ch.length>0){const bE2=U.h('div','cb');bE2.innerHTML='<div class="ct2">各单位费用率对比</div>';const cdE2=U.h('div','cc');cdE2.id='c-er';bE2.appendChild(cdE2);cwE.appendChild(bE2);}
    else{const bE2=U.h('div','cb');bE2.innerHTML='<div class="ct2">费用结构</div>';const cdE2=U.h('div','cc');cdE2.id='c-ep';bE2.appendChild(cdE2);cwE.appendChild(bE2);}

      CF.mk(U.el('c-ex'),()=>CF.exC(exp.items.map(i=>i.nm),exp.items.map(i=>i.b),exp.items.map(i=>i.a)));

        const o=CF.base();Object.assign(o,{xAxis:{type:'category',data:uL,axisLine:{lineStyle:{color:'#e8ecf0'}},axisLabel:{rotate:uL.length>5?20:0}},yAxis:{type:'value',name:'费用率%',axisLine:{show:false},splitLine:{lineStyle:{color:'#f0f0f0'}},axisLabel:{formatter:'{value}%'}},series:[{name:'实际费用率',type:'bar',data:uR,itemStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'#fa8c16'},{offset:1,color:'#ffc069'}]},borderRadius:[3,3,0,0]},barMaxWidth:35},{name:'预算费用率',type:'line',data:uB,lineStyle:{color:'#1677ff',width:2,type:'dashed'},itemStyle:{color:'#1677ff'},symbol:'circle',symbolSize:7}]});

    },100);

      el.appendChild(U.h('div','st','五、销售预测（已签合同 + 跟进商机）'));

       {l:'4月力争目标',v:U.fmt(fc.stretch),co:'pu'},{l:'4月确保目标',v:U.fmt(fc.commit),co:'og'},
       {l:'4月预测(签+跟)',v:U.fmt(fc.nmTot),sub:'签: '+U.fmt(fc.nmSgn)+' | 跟: '+U.fmt(fc.nmPl),co:fc.nmRate>=100?'gn':fc.nmRate>=80?'og':'rd'}

      el.appendChild(g5);
      if(ch.length>0){
        const fcRows=ch.map(c=>{const f=MD.aFC(c.rks);return{_k:c.k,_l:c.l,_nl:c.nl,_sk:c.sk,label:c.l,annTgt:f.annTgt,q1Tgt:f.q1Tgt,q1Act:f.q1Act,q1Rate:f.q1Rate,q1YoY:f.q1YoY,nmTgt:f.nmTgt,nmSgn:f.nmSgn,nmPl:f.nmPl,nmTot:f.nmTot,nmRate:f.nmRate,stretch:f.stretch,commit:f.commit};});
        const fcSm={_s:true,label:'合计',annTgt:fc.annTgt,q1Tgt:fc.q1Tgt,q1Act:fc.q1Act,q1Rate:fc.q1Rate,q1YoY:fc.q1YoY,nmTgt:fc.nmTgt,nmSgn:fc.nmSgn,nmPl:fc.nmPl,nmTot:fc.nmTot,nmRate:fc.nmRate,stretch:fc.stretch,commit:fc.commit};
        buildT(el,[{key:'label',label:'单位',w:130},{key:'annTgt',label:'年度目标(万)',w:95,align:'r',render:v=>U.fN(v)},{key:'q1Act',label:'Q1完成(万)',w:90,align:'r',render:v=>U.fN(v)},{key:'q1Rate',label:'Q1完成率',w:80,align:'ct',render:v=>U.ltH(v)},{key:'q1YoY',label:'Q1同比',w:75,align:'ct',render:v=>U.fD(v)},{key:'nmTgt',label:'4月目标(万)',w:90,align:'r',render:v=>U.fN(v)},{key:'nmSgn',label:'已签预计(万)',w:90,align:'r',render:v=>U.fN(v)},{key:'nmPl',label:'商机预计(万)',w:90,align:'r',render:v=>U.fN(v)},{key:'nmTot',label:'4月预测(万)',w:90,align:'r',render:v=>U.fN(v)},{key:'nmRate',label:'预计完成率',w:80,align:'ct',render:v=>U.ltH(v)},{key:'stretch',label:'力争(万)',w:80,align:'r',render:v=>U.fN(v)},{key:'commit',label:'确保(万)',w:80,align:'r',render:v=>U.fN(v)}],
          fcRows.concat([fcSm]),{click:true,onClick(r){const u={};u[r._sk]=r._k;Nav.drill(r._l,r._nl,u);}});
        /* 预测分解图表 */
        const cwFC=U.h('div','cr');
        const bFC1=U.h('div','cb');bFC1.innerHTML='<div class="ct2">4月预测分解：已签合同 vs 跟进商机 vs 目标</div>';const cdFC1=U.h('div','cc');cdFC1.id='c-fc';bFC1.appendChild(cdFC1);cwFC.appendChild(bFC1);
        const bFC2=U.h('div','cb');bFC2.innerHTML='<div class="ct2">各单位一季度完成率</div>';const cdFC2=U.h('div','cc');cdFC2.id='c-q1r';bFC2.appendChild(cdFC2);cwFC.appendChild(bFC2);
        el.appendChild(cwFC);
        setTimeout(()=>{
          CF.mk(U.el('c-fc'),()=>CF.fcBar(fcRows.map(r=>r.label),fcRows.map(r=>r.nmSgn),fcRows.map(r=>r.nmPl),fcRows.map(r=>r.nmTgt)));
          const q1o=CF.base();Object.assign(q1o,{xAxis:{type:'category',data:fcRows.map(r=>r.label),axisLine:{lineStyle:{color:'#e8ecf0'}},axisLabel:{rotate:fcRows.length>5?20:0}},yAxis:{type:'value',name:'完成率%',axisLine:{show:false},splitLine:{lineStyle:{color:'#f0f0f0'}},axisLabel:{formatter:'{value}%'}},series:[{name:'Q1完成率',type:'bar',data:fcRows.map(r=>+r.q1Rate.toFixed(1)),itemStyle:{color:function(p){return p.value>=25?'#52c41a':p.value>=20?'#faad14':'#ff4d4f'},borderRadius:[3,3,0,0]},barMaxWidth:35,label:{show:true,position:'top',formatter:'{c}%',fontSize:11}},{name:'25%基准',type:'line',data:fcRows.map(()=>25),lineStyle:{color:'#ff4d4f',width:2,type:'dashed'},symbol:'none'}]});
          CF.mk(U.el('c-q1r'),q1o);
        },100);
      }
    }

    /* ====== 六、人效分析(国际专属) ====== */
    if(intl){
      el.appendChild(U.h('div','st','六、人效分析'));
      const seData=MD.aSE(ks);
      if(seData.length>0){
        buildT(el,[{key:'rank',label:'排名',w:50,align:'ct'},{key:'name',label:'销售经理',w:120},{key:'rg',label:'区域',w:80},{key:'yr',label:'司龄(年)',w:65,align:'ct'},{key:'annTgt',label:'年度目标(万)',w:95,align:'r',render:v=>U.fN(v)},{key:'ytd',label:'累计完成(万)',w:95,align:'r',render:v=>U.fN(v)},{key:'rate',label:'累计达成率',w:85,align:'ct',render:v=>U.ltH(v)},{key:'pipeline90d',label:'90天商机(万)',w:95,align:'r',render:v=>U.fN(v)},{key:'se',label:'销售费用(元)',w:95,align:'r',render:v=>U.fN(v)},{key:'seR',label:'费用率',w:70,align:'ct',render:(v)=>U.fP(v)},{key:'eval',label:'评价',w:80,align:'ct',render:v=>U.evTag(v)}],seData);
      }
      /* 人效图表 */
      const cwSE=U.h('div','cr');
      const bSE1=U.h('div','cb');bSE1.innerHTML='<div class="ct2">销售经理达成率排名</div>';const cdSE1=U.h('div','cc');cdSE1.id='c-se-rank';cdSE1.style.height=Math.max(310,seData.length*28)+'px';bSE1.appendChild(cdSE1);cwSE.appendChild(bSE1);
      const bSE2=U.h('div','cb');bSE2.innerHTML='<div class="ct2">费用率 vs 达成率散点</div>';const cdSE2=U.h('div','cc');cdSE2.id='c-se-scatter';bSE2.appendChild(cdSE2);cwSE.appendChild(bSE2);
      el.appendChild(cwSE);
      setTimeout(()=>{
        const top20=seData.slice(0,20).reverse();
        const ro=CF.base();Object.assign(ro,{grid:{top:20,right:80,bottom:20,left:120,containLabel:false},xAxis:{type:'value',name:'达成率%',axisLine:{show:false},splitLine:{lineStyle:{color:'#f0f0f0'}}},yAxis:{type:'category',data:top20.map(d=>d.name),axisLine:{lineStyle:{color:'#e8ecf0'}}},series:[{type:'bar',data:top20.map(d=>+d.rate.toFixed(1)),itemStyle:{color:function(p){return p.value>=25?'#52c41a':p.value>=20?'#faad14':'#ff4d4f'},borderRadius:[0,3,3,0]},barMaxWidth:18,label:{show:true,position:'right',formatter:'{c}%',fontSize:11}}]});
        CF.mk(U.el('c-se-rank'),ro);
        const so=CF.base();Object.assign(so,{xAxis:{type:'value',name:'达成率%',axisLine:{lineStyle:{color:'#e8ecf0'}},splitLine:{lineStyle:{color:'#f0f0f0'}}},yAxis:{type:'value',name:'费用率%',axisLine:{lineStyle:{color:'#e8ecf0'}},splitLine:{lineStyle:{color:'#f0f0f0'}}},series:[{type:'scatter',data:seData.map(d=>[+d.rate.toFixed(1),+d.seR.toFixed(1),d.name]),symbolSize:12,itemStyle:{color:'#1677ff',opacity:.7},label:{show:seData.length<=15,formatter:function(p){return p.data[2]},position:'right',fontSize:10,color:'#6b7280'}}],tooltip:{trigger:'item',formatter:function(p){return p.data[2]+'<br/>达成率: '+p.data[0]+'%<br/>费用率: '+p.data[1]+'%'}}});
        CF.mk(U.el('c-se-scatter'),so);
      },100);
    }

    /* ====== 预警 ====== */
    if(S.dl<=1){
      el.appendChild(U.h('div','st','预警：商机缺口清单（50%覆盖率不足100%）'));
      const al=[];ks.forEach(rk=>{const s=MD.aS([rk]),o=MD.aO([rk]),rm=s.rev.ann-s.rev.ytd,gp=rm-o.oh-o.hp,cv=rm>0?(o.oh+o.hp)/rm*100:999;if(cv<100)al.push({_a:true,label:MD.RL[rk],rem:rm,hp2:o.oh+o.hp,gap:gp,c50:cv});});
      al.sort((a,b)=>b.gap-a.gap);
      if(!al.length)el.appendChild(U.h('div','','<div style="color:var(--grn);padding:14px;background:var(--card);border-radius:var(--r);border:1px solid var(--bdr)">所有区域商机储备充足，无预警项。</div>'));
      else buildT(el,[{key:'label',label:'区域',w:140},{key:'rem',label:'剩余目标(万)',w:100,align:'r',render:v=>U.fN(v)},{key:'hp2',label:'在手+高概率(万)',w:110,align:'r',render:v=>U.fN(v)},{key:'gap',label:'缺口(万)',w:90,align:'r',render:v=>'<span class="dn">'+U.fN(v)+'</span>'},{key:'c50',label:'50%覆盖率',w:90,align:'ct',render:v=>U.ltH(v)}],al);
    }
  }
};

/* ===== APP ===== */
const App={
  render(){CF.kill();Nav.updBC();S.dl===0?R.overview():R.detail();},
  init(){S.dl=0;S.dp=[{label:'集团总览',lv:0}];App.render();}
};
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',App.init);else App.init();
})();
</script>
